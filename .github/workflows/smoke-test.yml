name: GUI Smoke Test

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  smoke:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pillow

      - name: Run unit tests
        run: python -m unittest tests/test_unit_inventory.py

      - name: Run integration tests
        run: python -m unittest tests/test_integration_inventory.py

      - name: Run smoke test
        run: python tests/smoke_test.py
